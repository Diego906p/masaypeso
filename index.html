<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PesoMás · Suma de Masa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(150deg,#EAE6FF 0%,#E4EEFF 100%);
  min-height:100vh;display:flex;
  align-items:flex-start;justify-content:center;
  padding:20px 8px 36px;
  -webkit-font-smoothing:antialiased;
}

/* ══ PHONE SHELL ══ */
.phone{
  width:100%;max-width:400px;
  background:#F4F2FF;border-radius:28px;overflow:hidden;
  box-shadow:0 2px 6px rgba(60,40,180,.06),0 12px 40px rgba(60,40,180,.14),0 28px 56px rgba(60,40,180,.07);
  display:flex;flex-direction:column;
}

/* ══ HEADER ══ */
.header{
  background:linear-gradient(110deg,#8578E8 0%,#6354D6 50%,#4E3EC4 100%);
  padding:13px 15px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-shrink:0;position:relative;overflow:hidden;
}
.header::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 85% 40%,rgba(255,255,255,.09),transparent 65%);
  pointer-events:none;
}
.header-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.avatar{
  width:46px;height:46px;border-radius:50%;background:#fff;
  flex-shrink:0;overflow:hidden;
  border:2.5px solid rgba(255,255,255,.45);
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.user-name{font-size:16px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.user-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.76);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{display:flex;align-items:center;gap:4px;background:#FF9500;border-radius:20px;padding:5px 9px;white-space:nowrap}
.badge-racha{background:#E07800}
.badge-icon{font-size:13px;line-height:1}
.badge-text{font-size:12px;font-weight:900;color:#fff}
.gear-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.17);border:1.5px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:background .15s;
}
.gear-btn:hover{background:rgba(255,255,255,.28)}

/* ══ PROGRESS ROW ══ */
.progress-row{
  background:#fff;padding:11px 15px 9px;
  display:flex;align-items:center;gap:7px;
  border-bottom:1.5px solid #EDE9FF;flex-shrink:0;
}
.nivel-tag{font-size:13px;font-weight:800;color:#1C1852;white-space:nowrap;flex-shrink:0}
.segments{display:flex;gap:3px;flex:1;min-width:0}
.seg{height:9px;flex:1;border-radius:5px;min-width:0;transition:background .4s}
.seg.on  {background:#5B50E0}
.seg.half{background:linear-gradient(90deg,#5B50E0 50%,#DDD9F6 50%)}
.seg.off {background:#DDD9F6}
.pct-text{font-size:12px;font-weight:800;color:#5B50E0;white-space:nowrap;flex-shrink:0}
.q-pill{
  border:1.5px solid #D5D2E8;border-radius:20px;padding:3px 9px;
  font-size:11px;font-weight:700;color:#4C4870;white-space:nowrap;flex-shrink:0;
}

/* ══ GAME AREA ══ */
#game-area{flex:1}
.content{padding:13px 13px 0;display:flex;flex-direction:column;gap:11px}

/* Transition */
.slide-out{opacity:0;transform:translateY(-8px);transition:opacity .2s,transform .2s}
.slide-in{animation:slideUp .3s cubic-bezier(.34,1.2,.64,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ══ QUESTION CARD ══ */
.q-card{
  background:#fff;border-radius:20px;padding:17px 15px;
  display:flex;align-items:flex-start;gap:13px;
  box-shadow:0 2px 10px rgba(80,60,200,.07),0 0 0 1px rgba(200,195,240,.3);
  animation:slideUp .3s both;
}
.icon-wrap{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic-lavender{background:#EDEAFF}
.ic-sky     {background:#E3EEFF}
.ic-mint    {background:#E0F7F4}
.q-text{font-size:17px;font-weight:700;color:#1C1852;line-height:1.6;min-width:0;flex:1;word-wrap:break-word;overflow-wrap:break-word}
.hl-v{color:#6350E0;font-weight:900}
.hl-b{color:#2B8EFF;font-weight:900}

/* ══ BARS CARD ══ */
.bars-card{
  background:#fff;border-radius:20px;padding:15px;
  display:flex;flex-direction:column;gap:14px;
  box-shadow:0 2px 10px rgba(80,60,200,.07),0 0 0 1px rgba(200,195,240,.3);
  animation:slideUp .32s .06s both;
}
.bar-row{display:flex;align-items:center;gap:9px;min-width:0}
.bar-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bar-lbl{
  font-size:12px;font-weight:700;color:#333158;
  width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.track{flex:1;min-width:0;height:22px;background:#EDEAFF;border-radius:11px;overflow:hidden;position:relative}
.fill{height:100%;border-radius:11px;position:relative;transition:width .75s cubic-bezier(.34,1.3,.64,1)}
.fill::after{
  content:'';position:absolute;
  top:4px;left:8px;right:8px;height:4px;
  background:rgba(255,255,255,.26);border-radius:4px;
}
.fill-v{background:linear-gradient(90deg,#8A7EFF,#6350E0);box-shadow:0 2px 8px rgba(99,80,224,.28)}
.fill-b{background:linear-gradient(90deg,#64ABFF,#2B8EFF);box-shadow:0 2px 8px rgba(43,142,255,.26)}
.fill-t{background:linear-gradient(90deg,#3DD8C0,#00B49A);box-shadow:0 2px 8px rgba(0,180,154,.24)}
.track-dashed{
  flex:1;min-width:0;height:22px;border-radius:11px;
  border:2px dashed #00C4A7;display:flex;align-items:center;justify-content:center;
  background:rgba(0,196,167,.04);
}
.q-glyph{font-size:15px;font-weight:900;color:#00B49A}
.bar-val{
  font-size:12px;font-weight:900;flex-shrink:0;
  text-align:right;white-space:nowrap;min-width:72px;max-width:82px;
  overflow:hidden;text-overflow:ellipsis;
}
.bv-v{color:#6350E0}
.bv-b{color:#2B8EFF}
.bv-t{color:#00B49A;font-size:14px}

/* ══ OPTIONS ══ */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;animation:slideUp .34s .1s both}
.opt{
  background:#fff;border:2px solid #E4E0F4;border-radius:16px;
  padding:13px 11px;display:flex;align-items:center;gap:9px;
  cursor:pointer;min-width:0;font-family:'Nunito',sans-serif;
  transition:border-color .16s,background .16s,transform .14s,box-shadow .14s;
  box-shadow:0 1px 5px rgba(80,60,200,.07);
  -webkit-tap-highlight-color:transparent;
}
.opt:hover:not(:disabled){
  border-color:#6350E0;background:#F5F2FF;
  transform:translateY(-2px);box-shadow:0 4px 14px rgba(99,80,224,.15);
}
.opt:active:not(:disabled){transform:scale(.97);box-shadow:none}
.opt:disabled{cursor:not-allowed}
.opt.state-correct{
  border-color:#00C4A7;background:linear-gradient(135deg,#DFFAF4,#F0FDFB);
  box-shadow:0 0 0 3px rgba(0,196,167,.18);animation:popIn .3s;
}
.opt.state-wrong{
  border-color:#F04E4E;background:linear-gradient(135deg,#FFF0EE,#FFF5F5);
  box-shadow:0 0 0 3px rgba(240,78,78,.14);animation:shake .4s;
}
.letter{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:#EDE9FF;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#6350E0;
}
.opt.state-correct .letter{background:#C8F5ED;color:#007965}
.opt.state-wrong   .letter{background:#FFD9D6;color:#C62828}
.opt-label{font-size:14px;font-weight:800;color:#1C1852;min-width:0;line-height:1.2;word-break:break-word}
.opt.state-correct .opt-label{color:#007965}
.opt.state-wrong   .opt-label{color:#C62828}

/* ══ FEEDBACK ══ */
.feedback{
  border-radius:14px;padding:10px 13px;font-size:13px;font-weight:700;
  line-height:1.5;display:none;align-items:flex-start;gap:7px;
}
.feedback.visible{display:flex;animation:popIn .3s}
.feedback.ok {background:#E0F9F4;color:#005A50;border:1.5px solid #7DD9C8}
.feedback.bad{background:#FFF0EE;color:#C62828;border:1.5px solid #F5B0AB}
.content-end{height:14px}

/* ══ BOTTOM BAR ══ */
.bottom-bar{
  background:#fff;padding:12px 15px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  border-top:1.5px solid #EDE9FF;flex-shrink:0;margin-top:14px;
}
.pista-btn{
  display:flex;align-items:center;gap:5px;
  border:1.5px solid #D0CDE6;border-radius:22px;padding:8px 14px;
  background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:#555;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:border-color .15s,color .15s,background .15s;
}
.pista-btn:hover{border-color:#6350E0;color:#6350E0;background:#F5F2FF}
.pista-btn:disabled{opacity:.45;cursor:not-allowed}
.center-mot{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.shield-svg{filter:drop-shadow(0 3px 7px rgba(80,60,200,.25))}
.mot-lbl{font-size:11px;font-weight:800;color:#6350E0;white-space:nowrap}
.sig-btn{
  display:flex;align-items:center;gap:5px;border:none;border-radius:22px;
  padding:9px 15px;background:#E8E6F4;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;color:#B0ABD0;
  cursor:not-allowed;white-space:nowrap;flex-shrink:0;
  transition:background .2s,color .2s,box-shadow .18s,transform .14s;
}
.sig-btn.ready{
  background:linear-gradient(135deg,#7C6FF5,#5646D0);color:#fff;
  cursor:pointer;box-shadow:0 4px 14px rgba(99,80,224,.36);
}
.sig-btn.ready:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,80,224,.42)}
.sig-btn.ready:active{transform:scale(.97)}

/* ══ END SCREEN ══ */
.end-screen{padding:22px 18px 28px;text-align:center;animation:slideUp .4s both}
.confetti-zone{position:relative;height:44px;overflow:visible;margin-bottom:2px}
.cfp{position:absolute;border-radius:3px;animation:cfFall 1.6s ease forwards}
@keyframes cfFall{
  0%  {transform:translateY(-6px) rotate(0deg);opacity:1}
  100%{transform:translateY(95px) rotate(400deg);opacity:0}
}
.trophy-emoji{font-size:56px;display:block;margin:0 auto 8px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.end-title{font-size:22px;font-weight:900;color:#1C1852;margin-bottom:5px;letter-spacing:-.3px}
.end-sub{font-size:14px;font-weight:600;color:#6C699A;margin-bottom:16px;line-height:1.6}
.score-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#FFF3DC,#FFECC0);
  border:2px solid #F0CA6A;border-radius:16px;
  padding:10px 22px;margin-bottom:16px;
  font-size:14px;font-weight:900;color:#7A4A00;
  box-shadow:0 4px 12px rgba(245,166,35,.2);
}
.stars-row{display:flex;gap:4px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.star-item{font-size:17px}
.grade-section{margin-bottom:18px}
.grade-label{font-size:11px;font-weight:800;color:#9590C8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.grade-badge{
  display:inline-block;font-size:24px;font-weight:900;
  padding:5px 26px;border-radius:30px;letter-spacing:1px;
  animation:stamp .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes stamp{
  0%  {transform:scale(2.2) rotate(-18deg);opacity:0}
  60% {transform:scale(.92) rotate(3deg);opacity:1}
  100%{transform:scale(1) rotate(-1deg);opacity:1}
}
.grade-AD{background:linear-gradient(135deg,#00C99A,#00A87E);color:#fff}
.grade-A {background:linear-gradient(135deg,#8A7EFF,#6350E0);color:#fff}
.grade-B {background:linear-gradient(135deg,#FFD058,#F5A623);color:#7A4A00}
.grade-C {background:linear-gradient(135deg,#F07070,#E8544A);color:#fff}
.restart-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:13px 28px;border-radius:22px;border:none;
  background:linear-gradient(135deg,#7C6FF5,#5646D0);color:#fff;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 14px rgba(99,80,224,.36);
  transition:transform .15s,box-shadow .15s;
}
.restart-btn:hover {transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,80,224,.42)}
.restart-btn:active{transform:scale(.97)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:#1E1654;color:#fff;border-radius:18px;
  padding:10px 18px;font-size:13px;font-weight:700;line-height:1.5;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
  max-width:340px;width:max-content;text-align:center;
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ ANIMATIONS ══ */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
@keyframes popIn{
  0%  {transform:scale(.65);opacity:0}
  65% {transform:scale(1.05);opacity:1}
  100%{transform:scale(1)}
}
@keyframes barReveal{
  from{width:0}
}
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- ══ HEADER ══ -->
  <div class="header">
    <div class="header-left">
      <div class="avatar">
        <svg viewBox="0 0 46 46" width="46" height="46" xmlns="http://www.w3.org/2000/svg">

  <!-- ══ PROGRESS ROW ══ -->
  <div class="progress-row">
    <span class="nivel-tag">Nivel&nbsp;1</span>

  <!-- ══ GAME AREA — JS renders here ══ -->
  <div id="game-area"></div>

  <!-- ══ BOTTOM BAR ══ -->
  <div class="bottom-bar">
    <button class="pista-btn" id="pista-btn">💡 Pista</button>

    <button class="sig-btn" id="sig-btn" disabled>Siguiente&nbsp;→</button>

</div><!-- /phone -->

<div class="toast" id="toast"></div>

<script>
/* ─── SVG icon paths (stroke-based, 24×24 viewBox) ─── */
const IC = {
  book:       `<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
               <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>`,
  backpack:   `<path d="M16 6a4 4 0 0 0-8 0"/>
               <rect x="3" y="6" width="18" height="15" rx="3"/>
               <path d="M8 11h8M10 15h4"/>`,
  ball:       `<circle cx="12" cy="12" r="9"/>
               <path d="M5 7.5C7 10 7 14 5 16.5M19 7.5C17 10 17 14 19 16.5M3 12h18"/>`,
  bottle:     `<path d="M9 2h6v2l2 3v13a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V7l2-3V2z"/>
               <path d="M7 10h10"/>`,
  notebook:   `<rect x="4" y="2" width="16" height="20" rx="2"/>
               <path d="M8 6h8M8 10h8M8 14h5"/>`,
  pencil:     `<path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
               <path d="M15 5l4 4"/>`,

/* col → CSS classes */
const IC_BG  = { v:'ic-lavender', b:'ic-sky', t:'ic-mint' };
const IC_STR = { v:'#6350E0',     b:'#2B8EFF', t:'#00B49A' };
const FILL_C = { v:'fill-v',      b:'fill-b',  t:'fill-t' };
const BV_C   = { v:'bv-v',        b:'bv-b',    t:'bv-t'   };

function icon(name, sz, col) {
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none"
    stroke="${IC_STR[col]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    ${IC[name]||IC.calc}</svg>`;
}

/* ─── Format grams → "X kg Y g" or "Y g" ─── */
function fmt(g) {
  if (g >= 1000) {
    const kg = Math.floor(g / 1000);
    const r  = g % 1000;
    return r ? `${kg}&nbsp;kg&nbsp;${String(r).padStart(3,'0')}&nbsp;g` : `${kg}&nbsp;kg`;
  }
  return `${g}&nbsp;g`;
}
function fmtPlain(g) { return fmt(g).replace(/&nbsp;/g,' '); }

/* ════════════════════════════════════════════
   QUESTION BANK — 10 preguntas Suma de Masa
════════════════════════════════════════════ */
const QB = [

const LETTERS = ['A','B','C','D'];
const TOTAL   = QB.length;

/* ─── State ─── */
let qi=0, pts=0, racha=0, correctCount=0, answered=false;

/* ─── DOM refs ─── */
const $ga   = ()=>document.getElementById('game-area');
const $pts  = document.getElementById('pts-val');
const $rach = document.getElementById('racha-val');
const $segs = document.getElementById('segs-bar');
const $pct  = document.getElementById('pct-text');
const $qc   = document.getElementById('q-counter');
const $sig  = document.getElementById('sig-btn');
const $pis  = document.getElementById('pista-btn');
const $mot  = document.getElementById('mot-lbl');
const $tst  = document.getElementById('toast');

/* ═══ INIT ═══ */
function init() {
  qi=0; pts=0; racha=0; correctCount=0; answered=false;
  $pis.style.display=''; $sig.style.display='';
  $pis.disabled=false;
  $sig.disabled=true; $sig.classList.remove('ready');
  $sig.onclick=nextQ; $pis.onclick=showHint;
  buildSegs(); updateHUD(); renderQ();
}

/* ═══ BUILD SEGMENT BAR ═══ */
function buildSegs() {
  $segs.innerHTML = Array.from({length:TOTAL},()=>`<div class="seg off"></div>`).join('');
}

/* ═══ UPDATE HUD ═══ */
function updateHUD() {
  $pts.textContent  = pts + ' pts';
  $rach.textContent = racha;
  $mot.textContent  = QB[Math.min(qi,TOTAL-1)].motiv;
  const pct = Math.round(qi / TOTAL * 100);
  $pct.textContent = pct + '%';
  $qc.textContent  = `Pregunta ${Math.min(qi+1,TOTAL)} de ${TOTAL}`;
  document.querySelectorAll('.seg').forEach((s,i)=>{
    s.className = 'seg ' + (i < qi ? 'on' : 'off');
  });
}

/* ═══ RENDER QUESTION ═══ */
function renderQ() {
  const q   = QB[qi];
  const tot = q.o1.w + q.o2.w;
  const p1  = Math.round(q.o1.w / tot * 86);
  const p2  = Math.round(q.o2.w / tot * 86);

  $ga().innerHTML = `
  <div class="content" id="qa-wrap">

    <!-- Question card -->
    <div class="q-card">
      <div class="icon-wrap ${IC_BG[q.o1.col]}">
        ${icon(q.o1.icon, 27, q.o1.col)}
      </div>
      <p class="q-text">
        ${q.o1.art}&nbsp;${q.o1.name} ${q.o1.verb}
        <span class="hl-v">${fmt(q.o1.w)}</span><br>
        y ${q.o2.art}&nbsp;${q.o2.name} <span class="hl-b">${fmt(q.o2.w)}</span>.<br>
        ¿Cuánto ${q.conj} juntos?
      </p>
    </div>

    <!-- Bars card -->
    <div class="bars-card">
      <div class="bar-row">
        <div class="bar-ico ${IC_BG[q.o1.col]}">${icon(q.o1.icon,18,q.o1.col)}</div>
        <span class="bar-lbl">${q.o1.name}</span>
        <div class="track"><div class="fill ${FILL_C[q.o1.col]}" style="width:${p1}%"></div></div>
        <span class="bar-val ${BV_C[q.o1.col]}">${fmt(q.o1.w)}</span>
      </div>
      <div class="bar-row">
        <div class="bar-ico ${IC_BG[q.o2.col]}">${icon(q.o2.icon,18,q.o2.col)}</div>
        <span class="bar-lbl">${q.o2.name}</span>
        <div class="track"><div class="fill ${FILL_C[q.o2.col]}" style="width:${p2}%"></div></div>
        <span class="bar-val ${BV_C[q.o2.col]}">${fmt(q.o2.w)}</span>
      </div>
      <div class="bar-row">
        <div class="bar-ico ic-mint">${icon('calc',18,'t')}</div>
        <span class="bar-lbl">Total</span>
        <div class="track-dashed" id="total-trk"><span class="q-glyph">?</span></div>
        <span class="bar-val bv-t" id="total-val">?</span>
      </div>
    </div>

    <!-- Options -->
    <div class="opts">
      ${q.opts.map((v,i)=>`
        <button class="opt" data-i="${i}" data-ok="${i===q.ci}">
          <div class="letter">${LETTERS[i]}</div>
          <span class="opt-label">${fmt(v)}</span>
        </button>`).join('')}
    </div>

    <!-- Feedback -->
    <div class="feedback" id="fb"></div>
    <div class="content-end"></div>
  </div>`;

  document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>pick(b,q)));
  answered=false;
  $sig.disabled=true; $sig.classList.remove('ready');
  $pis.disabled=false;
}

/* ═══ PICK ANSWER ═══ */
function pick(btn, q) {
  if (answered) return;
  answered=true;
  $pis.disabled=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);

  const isOk = btn.dataset.ok === 'true';
  const tot  = q.o1.w + q.o2.w;
  const fb   = document.getElementById('fb');

  if (isOk) {
    btn.classList.add('state-correct');
    pts+=15; racha++; correctCount++;
    fb.className='feedback visible ok';
    fb.innerHTML=`✅ ¡Correcto! ${fmtPlain(q.o1.w)} + ${fmtPlain(q.o2.w)} = <strong>${fmtPlain(tot)}</strong>. ¡Excelente!`;
  } else {
    btn.classList.add('state-wrong');
    racha=0;
    document.querySelector(`.opt[data-i="${q.ci}"]`).classList.add('state-correct');
    fb.className='feedback visible bad';
    fb.innerHTML=`❌ La respuesta correcta es <strong>${fmtPlain(tot)}</strong>. ¡Sigue practicando!`;
  }

  revealTotal(tot, q.o1.w + q.o2.w);

  $pts.textContent  = pts + ' pts';
  $rach.textContent = racha;
  $sig.disabled=false; $sig.classList.add('ready');
}

/* ═══ REVEAL TOTAL BAR ═══ */
function revealTotal(tot) {
  const trk = document.getElementById('total-trk');
  const val = document.getElementById('total-val');
  if (!trk||!val) return;
  const newTrack = document.createElement('div');
  newTrack.className='track';
  newTrack.id='total-trk';
  newTrack.innerHTML=`<div class="fill fill-t" id="total-fill" style="width:0%"></div>`;
  trk.replaceWith(newTrack);
  setTimeout(()=>{
    const f=document.getElementById('total-fill');
    if(f){f.style.transition='width .8s cubic-bezier(.34,1.2,.64,1)';f.style.width='90%';}
  },30);
  val.innerHTML=fmt(tot);
  val.className='bar-val bv-t';
}

/* ═══ NEXT QUESTION ═══ */
function nextQ() {
  if (!answered) return;
  const wrap = document.getElementById('qa-wrap');
  if (wrap) { wrap.style.opacity='0'; wrap.style.transform='translateY(-8px)'; wrap.style.transition='opacity .2s,transform .2s'; }
  setTimeout(()=>{
    qi++;
    if (qi >= TOTAL) showComplete();
    else { updateHUD(); renderQ(); }
  }, 210);
}

/* ═══ HINT ═══ */
function showHint() {
  if (answered) return;
  showToast('💡 ' + QB[qi].hint.replace(/&nbsp;/g,' '));
}

let _toastT;
function showToast(msg) {
  $tst.innerHTML=msg; $tst.classList.add('show');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>$tst.classList.remove('show'),3400);
}

/* ═══ COMPLETE SCREEN ═══ */
function showComplete() {
  /* Fill all segments */
  document.querySelectorAll('.seg').forEach(s=>s.className='seg on');
  $pct.textContent='100%'; $qc.textContent='¡Completado!';

  /* Grade */
  const pct=Math.round(correctCount/TOTAL*100);
  let grade,gCls,emoji,msg;
  if(pct>=90){grade='AD';gCls='grade-AD';emoji='🏆';msg='¡Rendimiento sobresaliente!';}
  else if(pct>=70){grade='A';gCls='grade-A';emoji='🌟';msg='¡Muy buen desempeño!';}
  else if(pct>=50){grade='B';gCls='grade-B';emoji='😊';msg='¡Buen esfuerzo, sigue así!';}
  else{grade='C';gCls='grade-C';emoji='💪';msg='¡Practica un poco más, tú puedes!';}

  /* Confetti */
  const CF=['#6350E0','#2B8EFF','#FFD700','#00C4A7','#F07070','#FF9500','#FF78A0'];
  const cfHTML=Array.from({length:20},(_,i)=>{
    const c=CF[i%CF.length];
    const l=4+Math.random()*92, d=Math.random()*.9;
    const w=5+Math.random()*6, h=4+Math.random()*5;
    return `<div class="cfp" style="left:${l}%;width:${w}px;height:${h}px;background:${c};animation-delay:${d}s;transform:rotate(${Math.random()*360}deg)"></div>`;
  }).join('');

  /* Stars row */
  const stars=Array.from({length:TOTAL},(_,i)=>
    `<span class="star-item">${i<correctCount?'⭐':'☆'}</span>`).join('');

  $ga().innerHTML=`
  <div class="end-screen" id="qa-wrap">
    <div class="confetti-zone">${cfHTML}</div>
    <span class="trophy-emoji">${emoji}</span>
    <h2 class="end-title">¡Fase completada!</h2>
    <p class="end-sub">${correctCount} de ${TOTAL} respuestas correctas.<br>${msg}</p>
    <div class="score-pill">⭐&nbsp; ${pts} puntos ganados</div>
    <div class="stars-row">${stars}</div>
    <div class="grade-section">
      <p class="grade-label">Calificación</p>
      <div class="grade-badge ${gCls}">${grade}</div>
    </div>
    <button class="restart-btn" onclick="restart()">🔄&nbsp; Jugar de nuevo</button>
  </div>`;

  $pis.disabled=true;
  $sig.disabled=true; $sig.classList.remove('ready');
  $mot.textContent = pct>=90?'¡Eres increíble!':'¡Bien hecho!';
}

/* ═══ RESTART ═══ */
function restart() { init(); }

/* ═══ START ═══ */
init();
</script>
